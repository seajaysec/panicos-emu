name: ci

on:
  push:
    branches: [ "master", "feat/**", "fix/**" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: {}

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq shellcheck
      - name: Shell syntax check
        run: |
          for f in bin/*.sh scripts/*.sh bootstrap.sh "ports/Update Emulators.sh"; do
            echo "== bash -n $f"; bash -n "$f"
          done
      - name: ShellCheck (advisory)
        run: shellcheck -S warning bin/panicos-emu-install.sh || true
      - name: Engine self-tests
        run: bash tests/engine-test.sh

  gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - name: Compile GUI (aarch64)
        run: |
          docker run --rm --platform linux/arm64 -v "$PWD:/build" -w /build \
            debian:bookworm-slim sh -c '
              apt-get update -qq && apt-get install -y -qq gcc libsdl2-dev pkg-config
              gcc -O2 -Wall src/emu-manager.c -o /tmp/emu-manager \
                  $(pkg-config --cflags --libs sdl2) -lm
              file /tmp/emu-manager
            '
