## panicos-emu — PanicOS OVERRIDE layer (applied with RetroArch --appendconfig).
##
## This is layered ON TOP of ROCKNIX's full device-tuned base config (rocknix-base.cfg),
## so we inherit all of ROCKNIX's QOL (resampler quality, aspect defaults, savestate
## thumbnails, rewind/run-ahead scaffolding, crisp scaling, hotkey behaviour, ...) while
## these keys WIN to keep RetroArch compliant with PanicOS. Only PanicOS-critical settings
## live here; everything else comes from the ROCKNIX base.

# --- audio: PanicOS routes via SDL2 -> PipeWire -> codec @ 48 kHz (NOT RA's pipewire/alsa) ---
audio_driver = "sdl2"
audio_enable = "true"
audio_out_rate = "48000"
audio_sync = "true"

# --- video: Wayland / glcore under panicos-sway (context auto-selects wayland) ---
video_driver = "glcore"
video_context_driver = ""
video_fullscreen = "true"
video_threaded = "true"

# --- menu: rgui (built-in, no asset dependency) ---
menu_driver = "rgui"

# --- input: udev + our bundled ROCKNIX autoconfig (incl. the H700 Gamepad hotkeys) ---
input_joypad_driver = "udev"
joypad_autoconfig_dir = "/storage/emulators/retroarch/autoconfig"

# --- paths: everything into the sandbox / roms (override ROCKNIX's /tmp + ~ defaults) ---
libretro_directory = "/storage/emulators/retroarch/cores"
libretro_info_path = "/storage/emulators/retroarch/cores"
core_options_path = "/storage/emulators/retroarch/config/retroarch-core-options.cfg"
system_directory = "/storage/roms/bios"
savefile_directory = "/storage/emulators/retroarch/saves"
savestate_directory = "/storage/emulators/retroarch/states"
assets_directory = "/storage/emulators/retroarch/assets"
video_shader_dir = "/storage/emulators/retroarch/shaders"
cache_directory = "/tmp"
screenshot_directory = "/storage/roms/screenshots"
rgui_browser_directory = "/storage/roms"

# --- never let RA rewrite the base config on exit ---
config_save_on_exit = "false"
