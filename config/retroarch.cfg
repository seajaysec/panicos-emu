## panicos-emu — RetroArch config (OUR override layer; always wins).
## Rendered to /storage/emulators/retroarch/config/retroarch.cfg by the installer.
## Tuned for PanicOS on H700: matches PanicOS's intentional deviations rather than fighting them.
##  - audio_driver pipewire -> PanicOS is pipewire-native; the ALSA shim underruns under load
##                             (the panicos-es.service file warns about exactly this). If audio is
##                             silent/broken, try "alsathread" then "sdl2".
##  - audio_out_rate 48000  -> matches PanicOS's pinned codec rate (avoids the 44.1k crackle)
##  - video_driver glcore   -> ROCKNIX-proven under sway/Wayland on this SoC; context auto-selects
##                             wayland (WAYLAND_DISPLAY is inherited from ES). If a game
##                             black-screens, try video_driver "gl" or "sdl2".
video_driver = "glcore"
video_context_driver = ""
video_fullscreen = "true"
video_threaded = "true"
video_vsync = "true"
video_smooth = "false"
video_scale_integer = "false"
aspect_ratio_index = "22"

audio_driver = "pipewire"
audio_enable = "true"
audio_out_rate = "48000"
audio_sync = "true"
audio_latency = "64"

menu_driver = "rgui"
rgui_menu_color_theme = "4"
rgui_browser_directory = "/storage/roms"

input_joypad_driver = "udev"
input_max_users = "5"
input_autodetect_enable = "true"
joypad_autoconfig_dir = "/storage/emulators/retroarch/autoconfig"
all_users_control_menu = "true"

libretro_directory = "/storage/emulators/retroarch/cores"
libretro_info_path = "/storage/emulators/retroarch/cores"
system_directory = "/storage/roms/bios"
savefile_directory = "/storage/emulators/retroarch/saves"
savestate_directory = "/storage/emulators/retroarch/states"
assets_directory = "/storage/emulators/retroarch/assets"
cache_directory = "/tmp"
screenshot_directory = "/storage/roms/screenshots"

config_save_on_exit = "false"
savestate_auto_save = "false"
savestate_auto_load = "false"
quit_press_twice = "false"
pause_nonactive = "false"
fps_show = "false"
