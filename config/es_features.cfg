<?xml version="1.0" encoding="UTF-8" ?>
<!--
  panicos-emu minimal es_features.cfg

  Unlocks EmulationStation's per-game / per-system Emulator + Core selector for libretro
  systems. The actual core list comes from the <emulators> block in es_systems.cfg; this file
  just tells ES that "libretro" is a configurable emulator so the advanced game/system options
  menu appears. It keys off the emulator name, so the selector shows ONLY on systems that have an
  <emulators> block (our consoles) — Tools/Ports/norns keep their generic menus automatically.

  Intentionally NO other feature toggles: without batocera's configgen launcher, options like
  ratio/shader/rewind set in ES wouldn't actually apply (our wrapper doesn't read them), so we
  don't show dead controls. Core selection works because our launch command uses %CORE%.
-->
<features>
  <emulator name="libretro">
    <features/>
  </emulator>
</features>
