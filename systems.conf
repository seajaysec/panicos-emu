# panicos-emu — declarative EmulationStation systems.
# One line per console.  Fields separated by '|':
#   name | fullname | core | extensions(space-separated, no dots) | platform
#
# - name      : ES system id AND the rom folder name under /storage/roms/<name>/
# - core      : libretro core basename pulled from ROCKNIX (cores/<core>_libretro.so)
# - extensions: lowercase, space-separated. The installer adds UPPERCASE variants + .zip automatically.
# - platform  : ES platform + theme key (used for box art / theming)
#
# To add a system: add a line here, commit, then run 'Update Emulators' on the device.
# The installer fetches the core from ROCKNIX, creates /storage/roms/<name>/, and regenerates es_systems.
#
# name        | fullname                      | core             | extensions   | platform
gb            | Game Boy / Color              | gambatte         | gb gbc       | gb
nes           | Nintendo Entertainment System | fceumm           | nes          | nes
snes          | Super Nintendo                | snes9x           | sfc smc      | snes
gba           | Game Boy Advance              | mgba             | gba          | gba
genesis       | Sega Genesis / Mega Drive     | genesis_plus_gx  | md gen smd bin | genesis
mastersystem  | Sega Master System            | genesis_plus_gx  | sms          | mastersystem
gamegear      | Sega Game Gear                | genesis_plus_gx  | gg           | gamegear
colecovision  | ColecoVision                  | gearcoleco       | col          | colecovision
ngp           | Neo Geo Pocket                | beetle_ngp       | ngp ngc      | ngp
pcengine      | PC Engine / TurboGrafx-16     | beetle_pce_fast  | pce          | pcengine
wonderswan    | WonderSwan                    | beetle_wswan     | ws wsc       | wonderswan
n64           | Nintendo 64                   | mupen64plus_next | n64 z64 v64  | n64
